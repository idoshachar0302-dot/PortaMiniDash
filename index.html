<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0b0b0d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dashboard" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Desk Dashboard</title>
  </head>
  <body>
    <div id="app">
      <div class="dashboard">
        <header class="panel clocks-panel">
          <div class="clock local-clock">
            <div class="clock-label">Local</div>
            <div class="time" id="local-time">--:--</div>
            <div class="date" id="local-date">Loading...</div>
          </div>
          <div class="clock ny-clock">
            <div class="clock-label">
              New York
              <span class="market-dot" id="market-dot"></span>
              <span class="market-status" id="market-status">--</span>
            </div>
            <div class="time" id="ny-time">--:--</div>
            <div class="date" id="ny-date">--</div>
          </div>
        </header>

        <section class="panel weather-panel" id="weather">
          <h2 class="panel-title">Weather</h2>
          <div class="weather-content">
            <div class="weather-icon" id="weather-icon">--</div>
            <div class="weather-info">
              <div class="weather-temp" id="weather-temp">--&deg;</div>
              <div class="weather-desc" id="weather-desc">Loading...</div>
              <div class="weather-location" id="weather-location">--</div>
            </div>
          </div>
        </section>

        <section class="panel spotify-panel" id="now-playing">
          <div class="np-now">
            <button class="control-btn np-side-btn" id="prev-btn" aria-label="Previous track" disabled><svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 4a1 1 0 0 1 1 1v14a1 1 0 0 1-2 0V5a1 1 0 0 1 1-1Z"/><path d="M19.5 5.13a1 1 0 0 1 .5.87v12a1 1 0 0 1-1.55.83l-9-6a1 1 0 0 1 0-1.66l9-6a1 1 0 0 1 1.05-.04Z"/></svg></button>

            <button class="album-art" id="album-art" aria-label="Play or pause" disabled>
              <span class="album-art-icon" id="album-art-icon"></span>
            </button>

            <button class="control-btn np-side-btn" id="next-btn" aria-label="Next track" disabled><svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18 4a1 1 0 0 0-1 1v14a1 1 0 0 0 2 0V5a1 1 0 0 0-1-1Z"/><path d="M4.5 5.13a1 1 0 0 0-.5.87v12a1 1 0 0 0 1.55.83l9-6a1 1 0 0 0 0-1.66l-9-6a1 1 0 0 0-1.05-.04Z"/></svg></button>
          </div>

          <div class="np-details">
            <div class="np-info">
              <div class="track-title" id="track-title">Nothing playing</div>
              <div class="track-artist" id="track-artist">Connect Spotify in settings</div>

              <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
              <div class="progress-time">
                <span id="progress-current">0:00</span> / <span id="progress-total">0:00</span>
              </div>
            </div>

            <div class="queue-section">
              <h3 class="section-label">Up Next</h3>
              <ul class="queue-list" id="queue-list">
                <li class="queue-empty">No queue data yet</li>
              </ul>
            </div>
          </div>
        </section>
      </div>

      <button class="settings-btn" id="settings-btn" aria-label="Settings"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>

      <div class="settings-overlay" id="settings-overlay" hidden>
        <div class="settings-card">
          <h2>Settings</h2>

          <div class="setting-row">
            <span>Spotify</span>
            <button class="action-btn" id="spotify-connect-btn">Connect Spotify</button>
          </div>
          <div class="status-text" id="spotify-status">Not connected</div>

          <div class="setting-row">
            <span>Location</span>
            <span class="status-text" id="location-status">Requesting...</span>
          </div>

          <button class="action-btn close-btn" id="settings-close-btn">Close</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
